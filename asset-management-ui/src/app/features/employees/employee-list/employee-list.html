<h2>Employees</h2>

@if(loading){

  <mat-spinner></mat-spinner>

}

@else{

  <button
    mat-raised-button
    color="primary"
    routerLink="/employees/create">

    Create Employee

  </button>

  <br><br>

  <table
    mat-table
    [dataSource]="employees">

    <!-- Employee Code -->

    <ng-container matColumnDef="employeeCode">

      <th mat-header-cell *matHeaderCellDef>

        Employee Code

      </th>

      <td mat-cell *matCellDef="let employee">

        <a [routerLink]="['/employees', employee.id]">

          {{ employee.employeeCode }}

        </a>

      </td>

    </ng-container>

    <!-- Name -->

    <ng-container matColumnDef="name">

      <th mat-header-cell *matHeaderCellDef>

        Name

      </th>

      <td mat-cell *matCellDef="let employee">

        {{ employee.firstName }} {{ employee.lastName }}

      </td>

    </ng-container>

    <!-- Department -->

    <ng-container matColumnDef="department">

      <th mat-header-cell *matHeaderCellDef>

        Department

      </th>

      <td mat-cell *matCellDef="let employee">

        {{ employee.department }}

      </td>

    </ng-container>

    <!-- Designation -->

    <ng-container matColumnDef="designation">

      <th mat-header-cell *matHeaderCellDef>

        Designation

      </th>

      <td mat-cell *matCellDef="let employee">

        {{ employee.designation }}

      </td>

    </ng-container>

    <!-- Status -->

    <ng-container matColumnDef="status">

      <th mat-header-cell *matHeaderCellDef>

        Status

      </th>

      <td mat-cell *matCellDef="let employee">

        @if(employee.active){

          <span class="status-chip active">

            ACTIVE

          </span>

        }

        @else{

          <span class="status-chip inactive">

            INACTIVE

          </span>

        }

      </td>

    </ng-container>

    <!-- Action -->

    <ng-container matColumnDef="action">

      <th mat-header-cell *matHeaderCellDef>

        Action

      </th>

      <td mat-cell *matCellDef="let employee">

        <button
          mat-raised-button
          color="primary"
          [routerLink]="['/employees/edit', employee.id]">

          Edit

        </button>

      </td>

    </ng-container>

    <tr
      mat-header-row
      *matHeaderRowDef="displayedColumns">
    </tr>

    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns">
    </tr>

  </table>

  <mat-paginator
    [length]="totalElements"
    [pageSize]="size"
    [pageIndex]="page"
    [pageSizeOptions]="[5,10,20]"
    (page)="onPageChange($event)">
  </mat-paginator>

}
