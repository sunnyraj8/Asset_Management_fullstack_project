<h2>Departments</h2>

@if(loading){

  <mat-spinner></mat-spinner>

}

@else{

  <div class="toolbar">

    <button
      mat-raised-button
      color="primary"
      routerLink="/departments/create">

      Create Department

    </button>

    <mat-form-field appearance="outline">

      <mat-label>Search Department</mat-label>

      <input
        matInput
        placeholder="Department Code"
        [(ngModel)]="keyword"
        (keyup.enter)="search()">

    </mat-form-field>

    <button
      mat-raised-button
      (click)="search()">

      Search

    </button>

    <button
      mat-button
      color="warn"
      (click)="keyword='';loadDepartments()">

      Clear

    </button>

  </div>

  <br>

  <table
    mat-table
    [dataSource]="departments">

    <!-- Code -->

    <ng-container matColumnDef="departmentCode">

      <th mat-header-cell *matHeaderCellDef>

        Department Code

      </th>

      <td mat-cell *matCellDef="let department">

        <a
          [routerLink]="['/departments', department.id]">

          {{department.departmentCode}}

        </a>

      </td>

    </ng-container>

    <!-- Name -->

    <ng-container matColumnDef="departmentName">

      <th mat-header-cell *matHeaderCellDef>

        Department Name

      </th>

      <td mat-cell *matCellDef="let department">

        {{department.departmentName}}

      </td>

    </ng-container>

    <!-- Action -->

    <ng-container matColumnDef="action">

      <th mat-header-cell *matHeaderCellDef>

        Action

      </th>

      <td mat-cell *matCellDef="let department">

        <button
          mat-raised-button
          color="primary"
          [routerLink]="['/departments/edit', department.id]">

          Edit

        </button>

      </td>

    </ng-container>

    <tr
      mat-header-row
      *matHeaderRowDef="displayedColumns">
    </tr>

    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns">
    </tr>

  </table>

  <mat-paginator

    [length]="totalElements"

    [pageSize]="size"

    [pageIndex]="page"

    [pageSizeOptions]="[5,10,20]"

    (page)="onPageChange($event)">

  </mat-paginator>

}
