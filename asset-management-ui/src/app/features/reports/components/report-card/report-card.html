<div class="card">

  <div
    class="icon-box"
    [style.background]="color()">

    <span class="material-icons">

      {{icon()}}

    </span>

  </div>

  <h3>

    {{title()}}

  </h3>

  <p>

    {{description()}}

  </p>

  <button

    Generate Report

  </button>

</div>
