<h2>Assets</h2>

@if (loading) {

  <mat-spinner></mat-spinner>

} @else {

  <div class="toolbar">

    <button routerLink="/assets/create">

      Create Asset

    </button>

    <div class="search-box">

      <input
        type="text"
        placeholder="Search by Asset Code"
        [(ngModel)]="searchAssetCode"
        (keyup.enter)="search()">

      <button
        type="button"
        (click)="search()">

        Search

      </button>

      <button
        type="button"
        (click)="reset()">

        Reset

      </button>

    </div>

  </div>

  <br>

  <table mat-table [dataSource]="assets">

    <!-- Asset Code -->

    <ng-container matColumnDef="assetCode">

      <th mat-header-cell *matHeaderCellDef>
        Asset Code
      </th>

      <td mat-cell *matCellDef="let asset">

        <a [routerLink]="['/assets', asset.id]">
          {{ asset.assetCode }}
        </a>

      </td>

    </ng-container>

    <!-- Brand -->

    <ng-container matColumnDef="brand">

      <th mat-header-cell *matHeaderCellDef>
        Brand
      </th>

      <td mat-cell *matCellDef="let asset">
        {{ asset.brand }}
      </td>

    </ng-container>

    <!-- Model -->

    <ng-container matColumnDef="model">

      <th mat-header-cell *matHeaderCellDef>
        Model
      </th>

      <td mat-cell *matCellDef="let asset">
        {{ asset.model }}
      </td>

    </ng-container>

    <!-- Status -->

    <ng-container matColumnDef="status">

      <th mat-header-cell *matHeaderCellDef>
        Status
      </th>

      <td mat-cell *matCellDef="let asset">

  <span
    class="status-chip"
    [ngClass]="getStatusClass(asset.status)">

    {{ asset.status }}

  </span>

      </td>

    </ng-container>

    <!-- Action -->

    <ng-container matColumnDef="action">

      <th mat-header-cell *matHeaderCellDef>
        Action
      </th>

      <td mat-cell *matCellDef="let asset">

        <button
          [routerLink]="['/assets/edit', asset.id]">

          Edit

        </button>

      </td>

    </ng-container>

    <tr
      mat-header-row
      *matHeaderRowDef="displayedColumns">
    </tr>

    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns">
    </tr>

  </table>

  <mat-paginator

    [length]="totalElements"

    [pageSize]="size"

    [pageSizeOptions]="[5,10,20,50]"

    [pageIndex]="page"

    (page)="onPageChange($event)">

  </mat-paginator>

}
