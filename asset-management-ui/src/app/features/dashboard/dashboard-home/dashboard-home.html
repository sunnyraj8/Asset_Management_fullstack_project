<h2>Dashboard</h2>

@if(summary){

  <div class="cards">

    <app-summary-card
      title="Total Assets"
      [value]="summary.totalAssets"
      icon="inventory_2"
      color="#1976d2">
    </app-summary-card>

    <app-summary-card
      title="Employees"
      [value]="summary.totalEmployees"
      icon="groups"
      color="#43a047">
    </app-summary-card>

    <app-summary-card
      title="Departments"
      [value]="summary.totalDepartments"
      icon="apartment"
      color="#fb8c00">
    </app-summary-card>

    <app-summary-card
      title="Active Allocations"
      [value]="summary.activeAllocations"
      icon="assignment"
      color="#8e24aa">
    </app-summary-card>

  </div>

  <div class="chart-row">

    <div class="chart-card">

      <h3>Asset Status</h3>

      <app-pie-chart
        [data]="assetStatusChart">
      </app-pie-chart>

    </div>

    <div class="chart-card">

      <h3>Assets by Department</h3>

      <app-bar-chart
        [data]="departmentChart">
      </app-bar-chart>

    </div>

  </div>

  <div class="recent-section">

    <app-recent-history></app-recent-history>

  </div>

}
