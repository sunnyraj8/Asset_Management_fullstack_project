<div class="card">

  <div class="card-header">

    <div>

      <div class="title">
        {{ title() }}
      </div>

      <div class="value">
        {{ value() }}
      </div>

    </div>

    <div
      class="icon-wrapper"
      [style.background]="color()">

      <span class="material-icons">
        {{ icon() }}
      </span>

    </div>

  </div>

</div>
